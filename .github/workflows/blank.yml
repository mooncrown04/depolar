name: Eklenti ve README Yoneticisi

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bağımlılıkları Kur
        run: npm install node-fetch@2

      # --- 1. ADIM: PLUGINS.JSON OLUŞTURUCU (NODE.JS) ---
      - name: Plugins JSON Guncelle
        run: |
          node - <<'NODE'
          const fetch = require('node-fetch');
          const fs = require('fs');

          const urls = [
            'https://raw.githubusercontent.com/patr0nq/cstestAddons/refs/heads/builds/plugins.json',
            'https://raw.githubusercontent.com/marrem/cs-Kekik/builds/plugins.json',
            'https://raw.githubusercontent.com/feroxx/Kekik-cloudstream/builds/plugins.json',
            'https://raw.githubusercontent.com/Kraptor123/cs-kekikanime/builds/plugins.json',
            'https://raw.githubusercontent.com/sarapcanagii/Pitipitii/builds/plugins.json',
            'https://raw.githubusercontent.com/ramazansancar/keyiflerolsun_Kekik-cloudstream/builds/plugins.json',
            'https://raw.githubusercontent.com/Sertel392/Makotogecici/main/plugins.json',
            'https://raw.githubusercontent.com/GitLatte/Sinetech/builds/plugins.json',
            'https://raw.githubusercontent.com/Kraptor123/cs-kraptor/builds/plugins.json',
            'https://raw.githubusercontent.com/ByAyzen/AyzenCS3/builds/plugins.json'
          ];

          function normalizeVersion(v) {
            return String(v || '0.0.0').replace(/^v/i, '').trim();
          }

          function getRepoOwner(url) {
            const match = url.match(/githubusercontent\.com\/([^/]+)/);
            return match ? match[1] : "Unknown";
          }

          (async () => {
            const mergedMap = new Map();
            const today = new Date().toLocaleDateString('tr-TR');

            if (fs.existsSync('plugins.json')) {
              try {
                const oldContent = JSON.parse(fs.readFileSync('plugins.json', 'utf8'));
                for (const p of oldContent) mergedMap.set(p.id || p.name, p);
              } catch (e) { console.log("Eski dosya okunamadı."); }
            }

            for (const url of urls) {
              try {
                const res = await fetch(url);
                if (!res.ok) continue;
                const remotePlugins = await res.json();
                const repoOwner = getRepoOwner(url);

                for (const remote of remotePlugins) {
                  if (Array.isArray(remote.tvTypes) && remote.tvTypes.includes('NSFW')) continue;
                  
                  const key = remote.id || remote.name;
                  const existing = mergedMap.get(key);
                  
                  // BAYRAK GARANTİSİ: Dil yoksa 'tr' ata
                  if (!remote.language && !remote.lang) remote.language = "tr";

                  let marker = "";
                  if (!existing) marker = "🆕 ";
                  else if (normalizeVersion(remote.version) !== normalizeVersion(existing.version)) marker = "🔴 ";

                  if (marker) {
                    let cleanDesc = (remote.description || '').replace(/^(🔴|🆕).*?\d{2}\.\d{2}\.\d{4}/g, '').trim();
                    remote.description = `${marker}${repoOwner} ${today} ${cleanDesc}`;
                    mergedMap.set(key, remote);
                  }
                }
              } catch (e) { console.error(`${url} hatası: ${e.message}`); }
            }
            fs.writeFileSync('plugins.json', JSON.stringify(Array.from(mergedMap.values()), null, 2));
          })();
          NODE

      # --- 2. ADIM: README TABLO OLUŞTURUCU (PYTHON) ---
      - name: README.md Guncelle
        shell: python
        run: |
          import json, re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          OWNER = "MoOnCrOwN"
          OWNER_AVATAR = "https://st5.depositphotos.com/1041725/67731/v/380/depositphotos_677319750-stock-illustration-ararat-mountain-illustration-vector-white.jpg"
          OWNER_PROFILE = "https://github.com/mooncrown04"
          FLAGS = {"tr":("🇹🇷","TR"),"en":("🇬🇧","GB"),"de":("🇩🇪","DE"),"us":("🇺🇸","US")}
          
          now = datetime.now(timezone(timedelta(hours=3)))
          full_date = now.strftime("%d.%m.%Y %H:%M")

          with open("plugins.json", encoding="utf-8") as f:
              plugins = json.load(f)

          rows = []
          for p in sorted(plugins, key=lambda x: x.get('name','').lower()):
              name = p.get('name','Unknown')
              desc = p.get('description', '')
              marker = "🔴" if "🔴" in desc else ("🆕" if "🆕" in desc else " ")
              date_match = re.search(r'\d{2}\.\d{2}\.\d{4}', desc)
              date_str = date_match.group(0) if date_match else "—"
              
              lang_val = str(p.get("language") or p.get("lang") or "tr").lower().split('-')[0]
              flag, code = FLAGS.get(lang_val, ("🏴‍☠️", ""))
              country = f"{flag} [{code}]" if code else flag
              
              icon = p.get("iconUrl") or p.get("icon") or ""
              img_tag = f'<img src="{icon}" width="32">' if icon else "—"
              
              owner_match = re.search(r'(?:🆕 |🔴 )(.*?) \d', desc)
              repo_name = owner_match.group(1) if owner_match else "Bilinmiyor"

              rows.append(f"| {img_tag} | **{name}** | {date_str} | {marker} | {repo_name} | {country} |")

          header = (
              f"### Son Güncelleme: {full_date}\n\n"
              f"### Toplam Eklenti: {len(plugins)}\n\n"
              f"---\n### Depo Sahibi:\n[<img src='{OWNER_AVATAR}' width='48' style='border-radius:50%;'>]({OWNER_PROFILE})  \n"
              f"[{OWNER}]({OWNER_PROFILE})\n\n---\n## 📦 Eklenti Listesi\n\n"
              "| İkon | Eklenti Adı | Tarih | Durum | Kaynak | Ülke |\n"
              "|:----:|:------------|:------|:------|:-------|:----:|\n"
          )
          Path("README.md").write_text(header + "\n".join(rows), encoding="utf-8")

      # --- 3. ADIM: DEĞİŞİKLİKLERİ KAYDET ---
      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add plugins.json README.md
          git diff --staged --quiet || (git commit -m "Update plugins and README" && git push https://x-access-token:${GH_TOKEN}@github.com/mooncrown04/depolar.git HEAD:main)
