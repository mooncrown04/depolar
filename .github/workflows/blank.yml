name: Eklenti Derleyici

on:
  schedule:
    - cron: '21 20 * * *'
  workflow_dispatch:

jobs:
  build-and-push-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install node-fetch
        run: npm install node-fetch@2

      - name: Generate plugins.json
        run: |
          node - <<'NODE'
          const fetch = require('node-fetch');
          const fs = require('fs');

          const urls = [
            'https://raw.githubusercontent.com/patr0nq/cstestAddons/refs/heads/builds/plugins.json',
            'https://raw.githubusercontent.com/maarrem/cs-Kekik/builds/plugins.json',
            'https://raw.githubusercontent.com/feroxx/Kekik-cloudstream/builds/plugins.json',
            'https://raw.githubusercontent.com/Kraptor123/cs-kekikanime/builds/plugins.json',
            'https://raw.githubusercontent.com/sarapcanagii/Pitipitii/builds/plugins.json',
            'https://raw.githubusercontent.com/ramazansancar/keyiflerolsun_Kekik-cloudstream/builds/plugins.json',
            'https://raw.githubusercontent.com/Sertel392/Makotogecici/main/plugins.json',
            'https://raw.githubusercontent.com/GitLatte/Sinetech/builds/plugins.json',
            'https://raw.githubusercontent.com/Kraptor123/cs-kraptor/builds/plugins.json',
            'https://raw.githubusercontent.com/ByAyzen/AyzenCS3/builds/plugins.json'
          ];

          function normalizeVersion(v) {
            if (!v) return null;
            return String(v).replace(/^v/i, '');
          }

          function compareVersions(a, b) {
            const va = normalizeVersion(a);
            const vb = normalizeVersion(b);
            if (va === vb) return 0;
            return va > vb ? 1 : -1;
          }

          function getRepoOwner(url) {
            const match = url.match(/githubusercontent\.com\/([^/]+)/);
            return match ? match[1] : "Unknown";
          }

          (async () => {
            const mergedMap = new Map();
            const today = new Date().toLocaleDateString('tr-TR');

            // --- 1. ADIM: Mevcut dosyadaki eski verileri hafızaya al ---
            if (fs.existsSync('plugins.json')) {
              try {
                const oldContent = JSON.parse(fs.readFileSync('plugins.json', 'utf8'));
                for (const p of oldContent) {
                  const key = p.id || p.name;
                  mergedMap.set(key, p); 
                }
                console.log(`Mevcut dosyadan ${mergedMap.size} eklenti yüklendi.`);
              } catch (e) {
                console.error("Eski plugins.json okunurken hata oluştu, sıfırdan başlanıyor.");
              }
            }

            // --- 2. ADIM: Kaynakları tara ve güncelle ---
            for (const url of urls) {
              try {
                const res = await fetch(url);
                if (!res.ok) continue;
                const remotePlugins = await res.json();
                const repoOwner = getRepoOwner(url);

                for (const remote of remotePlugins) {
                  if (Array.isArray(remote.tvTypes) && remote.tvTypes.includes('NSFW')) continue;

                  const key = remote.id || remote.name;
                  const existing = mergedMap.get(key);

                  let needsUpdate = false;
                  let marker = "";

                  if (!existing) {
                    // Yeni eklenti
                    needsUpdate = true;
                    marker = "🆕 ";
                  } else if (compareVersions(remote.version, existing.version) !== 0) {
                    // Versiyon değişmiş
                    needsUpdate = true;
                    marker = "🔴 ";
                  }

                  if (needsUpdate) {
                    // Sadece versiyon değiştiğinde veya yeniyse tarih etiketini ekle
                    remote.description = `${marker}${repoOwner} ${today} ${remote.description || ''}`;
                    mergedMap.set(key, remote);
                    console.log(`Güncellendi/Eklendi: ${key} (${remote.version})`);
                  }
                  // EĞER VERSİYON AYNIYSA: mergedMap içindeki "existing" (eski hali) aynen kalır.
                }
              } catch (e) {
                console.error(`${url} hatası: ${e.message}`);
              }
            }

            const finalArray = Array.from(mergedMap.values());
            fs.writeFileSync('plugins.json', JSON.stringify(finalArray, null, 2));
            console.log(`İşlem tamamlandı. Toplam: ${finalArray.length}`);
          })();
          NODE

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add plugins.json
          git diff --staged --quiet || (git commit -m "Update plugins.json" && git push https://x-access-token:${GH_TOKEN}@github.com/mooncrown04/depolar.git HEAD:main)
