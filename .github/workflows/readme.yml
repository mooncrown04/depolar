import json, re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          OWNER = "MoOnCrOwN"
          OWNER_AVATAR = "https://st5.depositphotos.com/1041725/67731/v/380/depositphotos_677319750-stock-illustration-ararat-mountain-illustration-vector-white.jpg"
          OWNER_PROFILE = "https://github.com/mooncrown04"
          REPO_SHORT_CODE = "yok"

          IMAGE_KEYS = ["iconUrl","image","icon","logo","thumbnail","cover","img","picture","poster"]
          LANGUAGE_FLAGS = {"tr":("🇹🇷","TR"),"en":("🇬🇧","GB"),"de":("🇩🇪","DE")}
          DEFAULT_FLAG = ("🏴‍☠️","")

          def fix_icon_url(url):
              return url.replace("%size%","64") if url and "%size%" in url else url

          def turkish_types(tvtypes):
              mapping={"movie":"Film","tvseries":"Dizi","anime":"Anime","documentary":"Belgesel"}
              return [mapping.get(t.lower(),t.capitalize()) for t in (tvtypes or [])]

          def get_flag_and_code(language):
              return LANGUAGE_FLAGS.get(language.lower(),DEFAULT_FLAG)

          def get_repo_owner(url):
              m=re.search(r"githubusercontent\.com/([^/]+)",url or "")
              return m.group(1) if m else "UnknownRepo"

          def normalize_version(v):
              if not v: return "0.0.0"
              return str(v).lower().replace('v', '').strip()

          turkey_tz = timezone(timedelta(hours=3))
          now = datetime.now(turkey_tz)
          today_str = now.strftime("%d.%m.%Y")
          formatted_full_date = now.strftime("%d.%m.%Y %H:%M")

          # --- 1. ADIM: Eski README'den Mevcut Bilgileri Çek ---
          old_data_store = {} # { 'Eklenti Adı': {'version': '1.0', 'date': '01.01.2024', 'marker': '🔴'} }
          readme_path = Path("README.md")
          if readme_path.exists():
              content = readme_path.read_text(encoding="utf-8")
              # Tablo satırlarını bul: | ikon | **Ad** | Tarih | Durum | ... | |
              # Sondaki yorum satırı (comment) içinde versiyonu saklayacağız.
              lines = content.split('\n')
              for line in lines:
                  if "| **" in line:
                      parts = [p.strip() for p in line.split('|')]
                      if len(parts) >= 8:
                          name = re.sub(r'\*\*','', parts[2]) # **Ad** -> Ad
                          date_val = parts[3]
                          marker_val = parts[4]
                          # Gizli versiyon etiketini bul: v_match = re.search(r'', parts[7])
                          old_version = v_match.group(1) if v_match else "0.0.0"
                          old_data_store[name] = {"version": old_version, "date": date_val, "marker": marker_val}

          # --- 2. ADIM: plugins.json'dan Güncel Verileri Oku ---
          with open("plugins.json", encoding="utf-8") as f:
              plugins = json.load(f)

          unique_plugins = {}
          for plugin in plugins:
              name = (plugin.get("name") or plugin.get("title") or "").strip()
              if not name: continue

              new_version = normalize_version(plugin.get("version") or plugin.get("ver") or "0.0.0")
              repo_owner = get_repo_owner(plugin.get("url") or "")
              
              # Eski bilgi var mı?
              old_info = old_data_store.get(name)
              
              if not old_info:
                  # Tamamen yeni eklenti
                  marker = "🆕"
                  display_date = today_str
              elif old_info["version"] != new_version:
                  # Versiyon değişmiş
                  marker = "🔴"
                  display_date = today_str
              else:
                  # Versiyon AYNI -> Eski tarihi ve durumu koru
                  marker = old_info["marker"]
                  display_date = old_info["date"]

              # Diğer görsel verileri hazırla
              language = (plugin.get("language") or "").lower().strip()
              flag, code = get_flag_and_code(language)
              img_url = next((fix_icon_url(plugin[k]) for k in IMAGE_KEYS if plugin.get(k)), None)
              tur_types = ", ".join(turkish_types(plugin.get("tvTypes")))
              img_md = f'<img src="{img_url}" width="32">' if img_url else "—"
              country_col = f"{flag} [{code}]" if flag and code else DEFAULT_FLAG[0]

              # Tabloya ekle (Gizli versiyon sütunu ile)
              unique_plugins[name] = f"| {img_md} | **{name}** | {display_date} | {marker} | {repo_owner} | {tur_types} | {country_col} | |"

          # --- 3. ADIM: README Dosyasını Yaz ---
          readme_header = (
              f"### Son Güncelleme: {formatted_full_date}\n\n"
              f"### Repo Kısa Kodu: {REPO_SHORT_CODE}\n\n"
              f"### Toplam Eklenti Sayısı: {len(unique_plugins)}\n\n"
              "---\n\n"
              f"### Depo Sahibi:\n"
              f"[<img src='{OWNER_AVATAR}' width='48' height='48' style='border-radius:50%;'>]({OWNER_PROFILE})  \n"
              f"[{OWNER}]({OWNER_PROFILE})\n"
              "---\n\n"
              "## 📦 Eklenti Listesi\n\n"
              "| İkon | Eklenti Adı | Tarih | Durum | Depo | Türler | Ülke | |\n"
              "|:----:|:------------|:------|:------|:-----|:-------|:----:|:---:|\n"
          )

          table_rows = [unique_plugins[name] for name in sorted(unique_plugins.keys())]
          readme_content = readme_header + "\n".join(table_rows)
          Path("README.md").write_text(readme_content, encoding="utf-8")
